<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daftar Belanja Material</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--text:#171717;--muted:#6b7280;--line:#e5e7eb;--main:#111827;--soft:#f1f5f9;--green:#16a34a;--blue:#2563eb;--red:#dc2626}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}
.wrap{max-width:820px;margin:auto;padding:18px 14px 96px}.top{position:sticky;top:0;z-index:5;background:rgba(244,245,247,.92);backdrop-filter:blur(12px);padding:12px 0}
h1{font-size:25px;margin:0 0 5px}.sub{font-size:14px;color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 8px 26px rgba(0,0,0,.04)}
label{font-size:12px;font-weight:800;color:#374151;margin-bottom:6px;display:block}input,select,button{font:inherit}input,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px;background:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1.3fr .7fr .8fr;gap:10px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
button{border:0;border-radius:12px;padding:11px 13px;font-weight:800;cursor:pointer}.primary{background:var(--main);color:white}.ghost{background:var(--soft);color:var(--main)}.danger{background:#fee2e2;color:var(--red)}
.mini{font-size:12px;padding:7px 9px;border-radius:10px}.tabs{display:flex;gap:8px;overflow:auto;margin:12px 0}.tab{white-space:nowrap;background:#fff;border:1px solid var(--line)}.tab.active{background:var(--main);color:#fff}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.box{background:var(--soft);border-radius:15px;padding:11px;text-align:center}.num{font-size:22px;font-weight:900}.small{font-size:12px;color:var(--muted)}
.catTitle{font-size:19px;font-weight:900;margin:20px 0 8px}.item{display:grid;grid-template-columns:28px 1fr;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.check{width:22px;height:22px;margin-top:2px}
.name{font-weight:850}.meta{font-size:13px;color:var(--muted);margin-top:3px}.status{display:inline-block;font-size:11px;font-weight:900;border-radius:999px;padding:4px 9px;margin:7px 4px 0 0}.s-buy{background:#dbeafe;color:#1d4ed8}.s-arrived{background:#dcfce7;color:#166534}.actions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}.done .name{text-decoration:line-through;color:#6b7280}
.floating{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;justify-content:center;z-index:10}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:30;padding:14px}.modal.show{display:flex}.modalCard{background:#fff;border-radius:20px;max-width:760px;width:100%;max-height:90vh;overflow:auto;padding:16px}
.preview{background:#fff;color:#111;width:720px;max-width:100%;padding:28px;border:1px solid #ddd}.preview h2{margin:0 0 8px;font-size:28px}.preview .info{font-size:16px;margin-bottom:18px}.preview h3{font-size:21px;margin:18px 0 8px}.preview table{width:100%;border-collapse:collapse}.preview th,.preview td{border:1px solid #d1d5db;padding:9px;text-align:left;font-size:14px}.preview th{background:#f3f4f6}.badge{border-radius:99px;padding:3px 8px;font-size:12px;font-weight:800}
@media(max-width:560px){.grid,.grid3{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.wrap{padding-bottom:120px}.floating{flex-wrap:wrap}}
@media print{body{background:#fff}.top,.card.form,.tabs,.floating,.actions,.noPrint{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.item{break-inside:avoid}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Daftar Belanja Material</h1>
    <div class="sub">Kategori global sudah dikunci: Struktur, Atap, Pintu & Jendela, Kelistrikan, Plumbing, Finishing, Kayu & Hardware, Peralatan & Operasional, Lain-lain.</div>
  </div>

  <div class="card form">
    <div class="grid">
      <div><label>Nama Proyek</label><input id="project" placeholder="Contoh: Kos-kosan Palu"></div>
      <div><label>Tanggal</label><input id="date" type="date"></div>
    </div>
  </div>

  <div class="card form">
    <div class="grid">
      <div><label>Nama Material</label><input id="matName" placeholder="Contoh: Lampu LED 45 Watt"></div>
      <div><label>Kategori</label><select id="cat"></select></div>
    </div>
    <div class="grid3" style="margin-top:10px">
      <div><label>Jumlah</label><input id="qty" placeholder="Contoh: 7"></div>
      <div><label>Satuan</label><input id="unit" placeholder="bh/roll/unit"></div>
      <div><label>Status</label><select id="status"><option value="buy">Belanja</option><option value="arrived">Sudah datang</option></select></div>
    </div>
    <div style="margin-top:10px"><label>Catatan Item</label><input id="itemNote" placeholder="Contoh: urgent / merk bebas / kurang"></div>
    <div class="btns">
      <button id="saveBtn" class="primary" onclick="saveItem()">+ Simpan Material</button>
      <button class="ghost" onclick="quickSample()">Isi Contoh</button>
      <button class="danger" onclick="clearAll()">Reset</button>
    </div>
  </div>

  <div class="card">
    <div class="summary">
      <div class="box"><div class="num" id="nAll">0</div><div class="small">Total Item</div></div>
      <div class="box"><div class="num" id="nBuy">0</div><div class="small">Belanja</div></div>
      <div class="box"><div class="num" id="nArrived">0</div><div class="small">Sudah Datang</div></div>
    </div>
  </div>

  <div class="tabs" id="viewTabs"></div>
  <div class="tabs" id="catTabs"></div>
  <div id="list"></div>
</div>

<div class="floating">
  <button class="ghost" onclick="copyText()">Copy WA/Notion</button>
  <button class="ghost" onclick="showPreview()">Preview Kirim Klien</button>
  <button class="primary" onclick="window.print()">Simpan PDF/Gambar</button>
</div>

<div class="modal" id="previewModal">
  <div class="modalCard">
    <div id="preview" class="preview"></div>
    <div class="btns noPrint">
      <button class="primary" onclick="window.print()">Simpan PDF / Screenshot</button>
      <button class="ghost" onclick="closePreview()">Tutup</button>
    </div>
  </div>
</div>

<script>
const GLOBAL_CATEGORIES = [
  'Struktur',
  'Atap',
  'Pintu & Jendela',
  'Kelistrikan',
  'Plumbing',
  'Finishing',
  'Kayu & Hardware',
  'Peralatan & Operasional',
  'Lain-lain'
];

const STORAGE_KEY = 'materialBelanjaV3Global';
let db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
if(!db.items) db.items = [];
let editId = null, view = 'Semua', catFilter = 'Semua';

const el=id=>document.getElementById(id);
function persist(){db.project=el('project').value;db.date=el('date').value;localStorage.setItem(STORAGE_KEY,JSON.stringify(db))}
function init(){
  el('project').value=db.project||'Kos-kosan Palu';
  el('date').value=db.date||new Date().toISOString().slice(0,10);
  renderCats();render();
}
['project','date'].forEach(id=>el(id).addEventListener('input',()=>{persist();render()}));

function renderCats(){
  el('cat').innerHTML = GLOBAL_CATEGORIES.map(c=>`<option>${c}</option>`).join('');
}
function normalizeCat(c){
  if(GLOBAL_CATEGORIES.includes(c)) return c;
  const map = {
    'Listrik':'Kelistrikan',
    'Papan':'Kayu & Hardware',
    'Paku':'Kayu & Hardware',
    'Perlengkapan':'Peralatan & Operasional',
    'Peralatan Kerja':'Peralatan & Operasional'
  };
  return map[c] || 'Lain-lain';
}
function saveItem(){
  const name=el('matName').value.trim();
  if(!name) return alert('Nama material belum diisi.');
  const item={id:editId||Date.now(),name,cat:el('cat').value,qty:el('qty').value.trim(),unit:el('unit').value.trim(),status:el('status').value,note:el('itemNote').value.trim()};
  if(editId) db.items=db.items.map(x=>x.id===editId?item:x); else db.items.push(item);
  editId=null; el('saveBtn').textContent='+ Simpan Material';
  ['matName','qty','unit','itemNote'].forEach(id=>el(id).value=''); el('status').value='buy';
  persist(); render();
}
function editItem(id){
  const x=db.items.find(i=>i.id===id); if(!x)return;
  editId=id; el('matName').value=x.name; el('cat').value=normalizeCat(x.cat); el('qty').value=x.qty; el('unit').value=x.unit; el('status').value=x.status; el('itemNote').value=x.note;
  el('saveBtn').textContent='✓ Update Material'; window.scrollTo({top:0,behavior:'smooth'});
}
function setStatus(id,s){db.items=db.items.map(x=>x.id===id?{...x,status:s}:x);persist();render()}
function delItem(id){if(confirm('Hapus item ini?')){db.items=db.items.filter(x=>x.id!==id);persist();render()}}
function labelStatus(s){return s==='arrived'?'Sudah datang':'Belanja'}
function cls(s){return s==='arrived'?'s-arrived':'s-buy'}

function filtered(){
  let arr=db.items.map(x=>({...x, cat:normalizeCat(x.cat)}));
  if(view==='Belanja') arr=arr.filter(x=>x.status==='buy');
  if(view==='Sudah datang') arr=arr.filter(x=>x.status==='arrived');
  if(catFilter!=='Semua') arr=arr.filter(x=>x.cat===catFilter);
  return arr;
}
function render(){
  el('nAll').textContent=db.items.length; el('nBuy').textContent=db.items.filter(x=>x.status==='buy').length; el('nArrived').textContent=db.items.filter(x=>x.status==='arrived').length;
  const views=['Semua','Belanja','Sudah datang'];
  el('viewTabs').innerHTML=views.map(v=>`<button class="tab ${view===v?'active':''}" onclick="view='${v}';render()">${v}</button>`).join('');
  const cats=['Semua',...GLOBAL_CATEGORIES];
  el('catTabs').innerHTML=cats.map(c=>`<button class="tab ${catFilter===c?'active':''}" onclick="catFilter='${c}';render()">${c}</button>`).join('');
  const arr=filtered(), group={}; arr.forEach(x=>(group[x.cat]??=[]).push(x));
  if(!arr.length){el('list').innerHTML=`<div class="card"><b>Belum ada data.</b><div class="sub">Tambahkan material atau ubah filter.</div></div>`;return}
  el('list').innerHTML=Object.keys(group).map(c=>`
    <div class="catTitle">${c}</div><div class="card">
    ${group[c].map(x=>`
      <div class="item ${x.status==='arrived'?'done':''}">
        <input class="check" type="checkbox" ${x.status==='arrived'?'checked':''} onchange="setStatus(${x.id},this.checked?'arrived':'buy')">
        <div>
          <div class="name">${x.name}${x.qty||x.unit?' — ':''}${x.qty||''} ${x.unit||''}</div>
          <div class="meta">${x.note||''}</div>
          <span class="status ${cls(x.status)}">${labelStatus(x.status)}</span>
          <div class="actions">
            <button class="mini ghost" onclick="setStatus(${x.id},'buy')">Belanja</button>
            <button class="mini ghost" onclick="setStatus(${x.id},'arrived')">Sudah datang</button>
            <button class="mini ghost" onclick="editItem(${x.id})">Edit</button>
            <button class="mini danger" onclick="delItem(${x.id})">Hapus</button>
          </div>
        </div>
      </div>`).join('')}</div>`).join('');
}
function buildText(){
  const tanggal=el('date').value?new Date(el('date').value).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}):'-';
  const arr=filtered(), group={}; arr.forEach(x=>(group[x.cat]??=[]).push(x));
  let t=`*Daftar Belanja Material*\n*Proyek*: ${el('project').value||'-'}\n*Tanggal*: ${tanggal}\n*Filter*: ${view} / ${catFilter}\n`;
  Object.keys(group).forEach(c=>{t+=`\n*${c}*\n`;group[c].forEach(x=>{t+=`${x.status==='arrived'?'✅':'☐'} ${x.name}${x.qty||x.unit?' — ':''}${x.qty||''} ${x.unit||''}${x.note?' ('+x.note+')':''} - ${labelStatus(x.status)}\n`})});
  return t;
}
async function copyText(){persist();await navigator.clipboard.writeText(buildText());alert('Sudah dicopy.')}
function showPreview(){
  const tanggal=el('date').value?new Date(el('date').value).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}):'-';
  const arr=filtered(), group={}; arr.forEach(x=>(group[x.cat]??=[]).push(x));
  el('preview').innerHTML=`<h2>Daftar Belanja Material</h2><div class="info"><b>Proyek:</b> ${el('project').value||'-'}<br><b>Tanggal:</b> ${tanggal}<br><b>Tampilan:</b> ${view} / ${catFilter}</div>`+
  Object.keys(group).map(c=>`<h3>${c}</h3><table><thead><tr><th>No</th><th>Material</th><th>Qty</th><th>Status</th><th>Catatan</th></tr></thead><tbody>${group[c].map((x,i)=>`<tr><td>${i+1}</td><td>${x.name}</td><td>${x.qty||''} ${x.unit||''}</td><td><span class="badge">${labelStatus(x.status)}</span></td><td>${x.note||''}</td></tr>`).join('')}</tbody></table>`).join('');
  el('previewModal').classList.add('show');
}
function closePreview(){el('previewModal').classList.remove('show')}
function clearAll(){if(confirm('Reset semua data?')){db={items:[]};persist();render()}}
function quickSample(){
db.items=[
{id:1,name:'Semen PCC',cat:'Struktur',qty:'50',unit:'zak',status:'buy',note:''},
{id:2,name:'Baja ringan C75',cat:'Atap',qty:'20',unit:'btg',status:'buy',note:''},
{id:3,name:'Lampu LED 45 Watt',cat:'Kelistrikan',qty:'7',unit:'bh',status:'buy',note:''},
{id:4,name:'Pipa 3/4',cat:'Plumbing',qty:'10',unit:'bh',status:'arrived',note:''},
{id:5,name:'Cat tembok',cat:'Finishing',qty:'2',unit:'pail',status:'buy',note:''},
{id:6,name:'Sekrop kerja',cat:'Peralatan & Operasional',qty:'4',unit:'bh',status:'buy',note:''}
];persist();render()}
init();
</script>
</body>
</html>
